version: "3.9"

services:
  backend:
    build: ./backend
    container_name: complyagent-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=sqlite:///./complyagent.db
      - GEMINI_MODEL=gemini-2.5-flash
    volumes:
      - backend-data:/app/data
      - db-data:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: complyagent-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://backend:8000

volumes:
  backend-data:
  db-data:
